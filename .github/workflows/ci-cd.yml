      # - name: Update image in cluster
      #   run: |
      #     kubectl set image deployment/taskflow-app \
      #       taskflow-app=${{ env.IMAGE_FULL }}:sha-${{ github.sha }} \
      #       -n taskflow
      #     kubectl rollout status deployment/taskflow-app -n taskflow --timeout=120s
