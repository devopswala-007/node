name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: taskflow-api
  REGISTRY: ghcr.io
  # Set this to your GitHub username/org:
  IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/taskflow-api

jobs:
  # ─── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key
          RATE_LIMIT_MAX_REQUESTS: 1000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        continue-on-error: true

  # ─── Job 3: Security Audit ────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm audit --audit-level=high
        continue-on-error: true   # Don't fail the pipeline on audit warnings

  # ─── Job 4: Build Docker Image ────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    # Only push on main branch (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write        # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo "Pushed image digest ${{ steps.build.outputs.digest }}"

  # ─── Job 5: Deploy to Staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    # Uncomment and configure when you have a real cluster:
    # if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notice
        run: |
          echo "========================================"
          echo "  Deploying to staging environment"
          echo "  Image: ${{ env.IMAGE_FULL }}:latest"
          echo "========================================"
          echo ""
          echo "To deploy to Kubernetes, add these steps:"
          echo "  1. Configure kubectl with your cluster credentials"
          echo "  2. Run: kubectl set image deployment/taskflow-app taskflow-app=IMAGE:TAG -n taskflow"
          echo "  3. Run: kubectl rollout status deployment/taskflow-app -n taskflow"

      # ── Uncomment when cluster is configured ──────────────────────────────────
      # - name: Configure kubectl
      #   uses: azure/k8s-set-context@v3
      #   with:
      #     kubeconfig: ${{ secrets.KUBE_CONFIG }}
