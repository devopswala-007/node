apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
  labels:
    app: taskflow
data:
  NODE_ENV: "production"
  PORT: "3000"
  APP_NAME: "TaskFlow API"
  LOG_LEVEL: "info"
  JWT_EXPIRES_IN: "7d"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  MONGODB_URI: "mongodb://mongo-service:27017/taskflow"
